<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/img/logo_small.png" type="image/png">
    <link rel="stylesheet" href="./css/contact.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Kontakt | Kochwelt</title>
</head>
<body>
    <header>
        <div class="contentRestrain headerContent">
            <figure>
                <a href="#">
                    <img src="./assets/img/logo_small.png" alt="Logo of a cooking hat">
                </a>
                <span>Kochwelt</span>
            </figure>
            <nav>
                <ul>
                    <li><a href="#">Start</a></li>
                    <li><a href="#">Rezept des Tages</a></li>
                    <li><a href="#">Kontakt</a></li>
                    <li><a href="#">Impressum</a></li>
                </ul>
            </nav>
        </div>
   </header>
    <main class="contact-page contentRestrain">
        <section class="contact-card">
            <h1>Schreib uns eine Nachricht</h1>

            <p class="contact-text">Du hast Fragen zu einem Rezept, möchtest uns Feedback geben oder suchst kulinarische Inspiration? Dann schreib uns gerne direkt über das Kontaktformular.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" type="text" placeholder="Dein Name">
                </div>

                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input id="email" type="email" placeholder="deine@email.de">
                </div>

                <div class="form-group">
                    <label for="message">Deine Nachricht</label>
                    <textarea id="message" type="text" placeholder="Schreib hier deine Nachricht..."></textarea>
                </div>

                <button class="submit-btn" type="submit">Abschicken</button>

            </form>
        </section>
    </main>
    <footer class="mainFooter">
        <div class="contentRestrain footerContent">
            <figure>
                <img class="logoCookingHat" src="./assets/img/logo_small.png" alt="Logo of a cooking hat">
                <span>Kochwelt</span>
            </figure>

            <div class="socialMedia">
                <img class="facebookLogo" src="./assets/img/find-us-on-facebook-icon.png" alt="Facebook Logo">
                <img class="instagramLogo" src="./assets/img/icons/instagram_logo.svg" alt="Instagram Logo">
                <img class="twitterLogo" src="./assets/img/follow-us-on-twitter.svg" alt="Twitter Logo">
            </div>
        </div>
   </footer>
</body>
</html>
