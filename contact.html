<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./assets/img/logo_small.png" type="image/png">
    <title>Kontakt | Kochwelt</title>
</head>
<body>
    <main class="contact-page">
        <section class="contact-card">
            <h1>Schreib uns eine Nachricht</h1>

            <p class="contact-text">Du hast Fragen zu einem Rezept, möchtest uns Feedback geben oder suchst kulinarische Inspiration? Dann schreib uns gerne direkt über das Kontaktformular.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" type="text" placeholder="Dein Name">
                </div>

                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input id="email" type="email" placeholder="deine@email.de">
                </div>

                <div class="form-group">
                    <label for="message">Deine Nachricht</label>
                    <textarea id="message" type="text" placeholder="Schreib hier deine Nachricht..."></textarea>
                </div>

                <button class="submit-btn" type="submit">Abschicken</button>

            </form>
        </section>
    </main>
</body>
</html>
