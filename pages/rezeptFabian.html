<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezept Fabian</title>
    <link rel="stylesheet" href="./css/rezeptFabian.css">
</head>
<body>
    <header>

    </header>

    <main>
        <h1>Pilze mit Rahmsauce</h1>
        <img src="" alt="">

        <div class="recipeProperties">
            <figure>
                <img width="15px" src="./assets/img/icons/clock-regular.svg" alt="Image of a Clock">
                <figcaption>
                    15 Min.
                </figcaption>
            </figure>
            <figure class="textNexttoFigure">
                <img width="15px" src="./assets/img/icons/brain-solid.svg" alt="Image of a brain">
                <figcaption>
                    simpel
                </figcaption>
            </figure>
            <figure class="textNexttoFigure">
                <img width="15px" src="./assets/img/icons/calendar-alt-regular.svg" alt="Image of a calendar">
                <figcaption>
                    28.09.2020
                </figcaption>
            </figure>
        </div>

        <p>
            Zuteten für 
            <input type="number">
            <button>Portionen</button>
        </p>
        <table>
            <tr>
                <td>
                    500g frische Champignons
                </td>
            </tr>
            <tr>
                <td>
                    1 Teelöffel Gemüsebrühe
                </td>
            </tr>
            <tr>
                <td>
                    1 Schuss Schlagsahne
                </td>
            </tr>
            <tr>
                <td>
                    2 Knoblauchzehen
                </td>
            </tr>
            <tr>
                <td>
                   3 Esslöffel Mehl 
                </td>
            </tr>
            <tr>
                <td>
                    3 Esslöffel Rapsöl
                </td>
            </tr>
        </table>
    </main>

    <footer>

    </footer>
</body>
</html>
